<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuai | Mandarin Typing Game</title>

    <!-- Primary SEO -->
    <meta name="description" content="Kuai is a calligraphy-styled Mandarin typing game. Practice Chinese Pinyin with tones through graded story passages — easy, medium, and hard. Challenge friends in real-time 1v1 battles." />
    <meta name="keywords" content="mandarin typing game, Chinese pinyin practice, learn Chinese typing, pinyin tones, Chinese reading practice, 1v1 Chinese battle" />
    <meta name="author" content="Kuai" />
    <link rel="canonical" href="https://kuaitype.com/" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kuaitype.com/" />
    <meta property="og:title" content="Kuai | Mandarin Typing Game" />
    <meta property="og:description" content="Practice Chinese Pinyin through graded story passages. Challenge friends in real-time 1v1 typing battles." />
    <meta property="og:image" content="https://kuaitype.com/og-image.png" />
    <meta property="og:site_name" content="Kuai" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://kuaitype.com/" />
    <meta name="twitter:title" content="Kuai | Mandarin Typing Game" />
    <meta name="twitter:description" content="Practice Chinese Pinyin through graded story passages. Challenge friends in real-time 1v1 typing battles." />
    <meta name="twitter:image" content="https://kuaitype.com/og-image.png" />

    <!-- Structured data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Kuai",
      "url": "https://kuaitype.com/",
      "description": "A calligraphy-styled Mandarin typing game. Practice Chinese Pinyin with tones through graded story passages and real-time 1v1 battles.",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Any",
      "inLanguage": ["en", "zh"],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Pinyin tone typing practice",
        "Graded Chinese reading passages",
        "Real-time 1v1 battle mode",
        "Vocabulary review list",
        "Multiple lesson topics"
      ]
    }
    </script>
    <link rel="preload" href="/brush-stroke.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="/Texturelabs_Paper_373XL.webp" as="image" />

    <link
      rel="icon"
      type="image/png"
      href="/favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Kuai" />
    <link rel="manifest" href="/favicon/site.webmanifest" />

    <!-- Preconnect FIRST -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Combined single request -->
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Protest+Revolution&family=Spectral:wght@300;600&family=Noto+Serif+SC:wght@400&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Spectral", serif;
        font-weight: 300;
        background-color: #f8f7f4;
        color: #000000;
        overflow-x: hidden;
      }
      a {
        color: inherit;
      }
      *:focus {
        outline: none;
      }
      .font-calligraphy {
        font-family: "Ma Shan Zheng", cursive;
      }
      /* Custom scrollbar to match B&W aesthetic */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f8f7f4;
      }
      ::-webkit-scrollbar-thumb {
        background: #000;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #333;
      }

      .ink-stroke-bg {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        20% {
          transform: translateX(-4px) rotate(-2deg);
        }
        40% {
          transform: translateX(4px) rotate(2deg);
        }
        60% {
          transform: translateX(-4px) rotate(-1deg);
        }
        80% {
          transform: translateX(4px) rotate(1deg);
        }
      }
      .animate-shake {
        animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
      }
    </style>
    <link rel="stylesheet" href="/index.css" />
    <noscript><style>.kuai-letter { opacity: 1 !important; }</style></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
